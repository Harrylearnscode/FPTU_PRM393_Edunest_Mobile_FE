name: edunest_mobile

description: EduNest Mobile MVP connected to EduNest_Backend APIs.

publish_to: 'none'

version: 0.2.0+3

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  go_router: ^14.2.0
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.7
  image_picker: ^1.1.2
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: any
  msix: ^3.17.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/Logo.png"

msix_config:
  display_name: EduNest
  publisher_display_name: noketchup
  identity_name: noketchup.EduNest
  publisher: CN=3BFDBE1D-EB63-4751-BE37-562E52FE8B7A
  msix_version: 1.0.1.0
  logo_path: assets/images/Logo.png
  output_name: EduNest
  store: true
  sign_msix: false
  install_certificate: false
  windows_build_args: --dart-define=EDUNEST_API_BASE_URL=https://edunest-backend-8e6z.onrender.com --dart-define=EDUNEST_APP_VERSION=1.0.0+1
  capabilities: internetClient
